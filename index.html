<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Gül'e Özel ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#03030a;
overflow:hidden;
height:100vh;
color:white;
}

canvas{
position:fixed;
left:0;
top:0;
z-index:-2;
}

#login{

position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;

}

.box{

width:420px;
max-width:90%;
padding:40px;
background:rgba(255,255,255,.08);

backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,.15);

border-radius:25px;

text-align:center;

box-shadow:0 0 40px rgba(255,0,100,.25);

}

h1{

font-family:"Great Vibes";
font-size:55px;
margin-bottom:15px;

}

p{

opacity:.8;
margin-bottom:20px;

}

input{

width:100%;
padding:15px;
border:none;
outline:none;
border-radius:15px;
font-size:18px;
margin-top:15px;

background:white;

}

button{

margin-top:20px;

width:100%;

padding:15px;

border:none;

border-radius:15px;

font-size:18px;

background:#ff2e63;

color:white;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:scale(1.05);

background:#ff4b7b;

}

#error{

margin-top:15px;

color:#ff5555;

display:none;

}

#main{

display:none;

height:100vh;

justify-content:center;

align-items:center;

flex-direction:column;

text-align:center;

}

.heart{

font-size:130px;

animation:beat 1s infinite;

}

@keyframes beat{

0%{transform:scale(1);}
50%{transform:scale(1.15);}
100%{transform:scale(1);}

}

.title{

font-family:"Great Vibes";

font-size:70px;

margin-top:20px;

}

.sub{

margin-top:10px;

font-size:20px;

opacity:.9;

}

.fade{

animation:fade 2s;

}

@keyframes fade{

from{

opacity:0;

transform:translateY(30px);

}

to{

opacity:1;

transform:translateY(0);

}

}

</style>

</head>

<body>

<canvas id="stars"></canvas>

<div id="login">

<div class="box">

<h1>❤️ Gül ❤️</h1>

<p>

Bu sayfa sadece tek bir kişi için hazırlandı...

</p>

<input id="pass" placeholder="Şifreyi Gir">

<button onclick="login()">

❤️ Giriş Yap

</button>

<div id="error">

Şifre yanlış...

</div>

</div>

</div>

<div id="main">

<div class="heart">

❤️

</div>

<div class="title fade">

Hoş geldin Gül...

</div>

<div class="sub fade">

Hayatıma hoş geldin. ❤️

</div>

</div>

<script>

function login(){

let p=document.getElementById("pass").value;

if(p=="16.07.2026"){

document.getElementById("login").style.display="none";

document.getElementById("main").style.display="flex";

}else{

document.getElementById("error").style.display="block";

}

}

const canvas=document.getElementById("stars");

const ctx=canvas.getContext("2d");

canvas.width=innerWidth;

canvas.height=innerHeight;

let stars=[];

for(let i=0;i<200;i++){

stars.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height,

r:Math.random()*2,

v:Math.random()*0.5+0.2

});

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

stars.forEach(s=>{

ctx.beginPath();

ctx.arc(s.x,s.y,s.r,0,6.28);

ctx.fill();

s.y+=s.v;

if(s.y>canvas.height){

s.y=0;

s.x=Math.random()*canvas.width;

}

});

requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
