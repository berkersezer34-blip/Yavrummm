<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>❤️ Gül ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

html{
scroll-behavior:smooth;
}

body{

background:
linear-gradient(180deg,#03030a,#070d18,#111827);

overflow-x:hidden;
color:white;

}

/* yıldızlar */

#stars{

position:fixed;
left:0;
top:0;
width:100%;
height:100%;
overflow:hidden;
z-index:-10;

}

.star{

position:absolute;
background:white;
border-radius:50%;
animation:twinkle 3s infinite;

}

@keyframes twinkle{

0%{opacity:.2;}
50%{opacity:1;}
100%{opacity:.2;}

}

/* kayan yıldız */

.shooting{

position:absolute;
width:3px;
height:3px;
background:white;

box-shadow:

0 0 8px white,
0 0 20px white;

animation:shoot 6s linear infinite;

}

@keyframes shoot{

0%{

transform:
translate(-200px,-200px);

opacity:0;

}

10%{

opacity:1;

}

100%{

transform:
translate(1700px,900px);

opacity:0;

}

}

.login{

height:100vh;
display:flex;
justify-content:center;
align-items:center;

}

.card{

backdrop-filter:blur(25px);

background:

rgba(255,255,255,.08);

padding:45px;

border-radius:30px;

text-align:center;

width:90%;
max-width:430px;

box-shadow:

0 25px 70px rgba(0,0,0,.4);

}

.card h1{

font-family:"Great Vibes",cursive;

font-size:55px;

margin-bottom:20px;

color:#ff9ac4;

}

input{

width:100%;
padding:16px;

border:none;

outline:none;

border-radius:15px;

font-size:18px;

margin-top:20px;

}

button{

margin-top:20px;

width:100%;

padding:15px;

border:none;

border-radius:15px;

font-size:18px;

cursor:pointer;

background:

linear-gradient(90deg,#ff4f91,#ff79b0);

color:white;

transition:.4s;

}

button:hover{

transform:scale(1.05);

}

#error{

margin-top:15px;
color:#ff8080;

}

.hidden{

display:none;

}

.hero{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

text-align:center;

padding:30px;

position:relative;

}

.glass{

background:rgba(255,255,255,.08);

backdrop-filter:blur(25px);

padding:45px;

border-radius:35px;

max-width:900px;

box-shadow:0 20px 60px rgba(0,0,0,.35);

}

.title{

font-family:"Great Vibes",cursive;

font-size:90px;

color:#ffb6d9;

}

.subtitle{

margin-top:15px;

font-size:22px;

opacity:.9;

}

.counter{

margin-top:35px;

font-size:28px;

font-weight:bold;

color:#ffd2ea;

}

.heart{

font-size:95px;

margin-top:30px;

animation:beat 1.2s infinite;

display:inline-block;

}

@keyframes beat{

0%{

transform:scale(1);

}

50%{

transform:scale(1.2);

}

100%{

transform:scale(1);

}

}

/* romantik mektup */

.letter{

margin:80px auto;

max-width:900px;

background:rgba(255,255,255,.08);

padding:45px;

border-radius:30px;

backdrop-filter:blur(20px);

line-height:2;

font-size:20px;

}

.letter h2{

font-family:Great Vibes;

font-size:60px;

margin-bottom:25px;

color:#ffb0d4;

text-align:center;

}

/* sürpriz */

.surprise{

text-align:center;

padding:80px 20px;

}

.gift{

width:180px;
height:180px;

margin:auto;

cursor:pointer;

transition:.4s;

}

.gift:hover{

transform:scale(1.08);

}

.message{

margin-top:30px;

font-size:28px;

display:none;

animation:fade 1s;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(20px);

}

to{

opacity:1;
transform:translateY(0);

}

}

/* final */

.final{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

flex-direction:column;

text-align:center;

padding:20px;

}

.final h1{

font-family:Great Vibes;

font-size:95px;

color:#ffd4ea;

}

.final p{

font-size:26px;

margin-top:20px;

}

#petals{

position:fixed;
left:0;
top:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
z-index:999;

}

.petal{

position:absolute;

font-size:24px;

animation:fall linear forwards;

}

@keyframes fall{

0%{

transform:translateY(-80px) rotate(0);

}

100%{

transform:translateY(120vh) rotate(720deg);

}

}

.clickHeart{

position:fixed;
font-size:25px;
pointer-events:none;
animation:pop 1s forwards;

}

@keyframes pop{

0%{

transform:scale(.2);
opacity:1;

}

100%{

transform:translateY(-120px) scale(2);
opacity:0;

}

}

@media(max-width:700px){

.title{

font-size:58px;

}

.final h1{

font-size:60px;

}

.counter{

font-size:22px;

}

.letter{

font-size:17px;

}

}

</style>

</head>

<body>

<div id="stars"></div>

<div id="petals"></div>

<div class="login" id="login">

<div class="card">

<h1>❤️ Gül ❤️</h1>

<p>Bu site sadece sana özel...</p>

<input
id="password"
type="password"
placeholder="Şifre">

<button onclick="login()">

Giriş Yap

</button>

<div id="error"></div>

</div>

</div>

<div id="content" class="hidden">

<section class="hero">

<div class="glass">

<div class="title">

Gül 🌹

</div>

<div class="subtitle">

Bazı insanlar hayatımıza gelir...
Ve her şeyi değiştirir.

</div>

<div class="heart">

❤️

</div>

<div class="counter" id="counter">

</div>

</div>

</section>
